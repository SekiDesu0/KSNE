name: ksne

services:
  ksne:
    image: ksne:latest
    container_name: ksne-server
    ports:
      - "5500:5000"
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
      - TZ=America/Santiago
    volumes:
      - /home/sekidesu/dockerVolumes/ksne/db:/app/db
      - /home/sekidesu/dockerVolumes/ksne/static/cache:/app/static/cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
